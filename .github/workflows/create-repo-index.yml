name: Create Repository Index for AI Assistants

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'repo-index.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate repo-index.json
        run: python .github/scripts/generate_repo_index.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit and push index if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update repo index [skip ci]"
          file_pattern: "repo-index.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"